# Relaxed from 9 (11.25ms) to 12 (15ms). With EXPERIMENTAL_CONN off these
# preferred params are what the peripheral actually requests; a strict host
# (Windows 11 work PC) was rejecting the tighter range. Host negotiates down
# for HID, so cursor feel should be unaffected. Widen further if it still fails.
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=16
CONFIG_BT_BUF_ACL_TX_COUNT=32
CONFIG_BT_L2CAP_TX_BUF_COUNT=32

# enable auto-sleeping after being idle for 15 mins (unit: ms)
# CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Transmission power. PLUS_8 (max) raises the peak radio current during the
# BLE connection burst, which can brown out the shared EXT_POWER rail and reset
# the trackball. Left at default (0 dBm) while debugging the sensor dropouts;
# re-enable a higher level later if BLE range is insufficient.
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Disabled: the experimental connection handling negotiates params some host
# BT stacks (locked-down Windows 11) reject, causing pairing to spin/fail.
# Win10 tolerated it; the work PC did not.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_EXT_POWER=y