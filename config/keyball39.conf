CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9
CONFIG_BT_PERIPHERAL_PREF_LATENCY=16
CONFIG_BT_BUF_ACL_TX_COUNT=32
CONFIG_BT_L2CAP_TX_BUF_COUNT=32

# enable auto-sleeping after being idle for 15 mins (unit: ms)
# CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Transmission power. PLUS_8 (max) raises the peak radio current during the
# BLE connection burst, which can brown out the shared EXT_POWER rail and reset
# the trackball. Left at default (0 dBm) while debugging the sensor dropouts;
# re-enable a higher level later if BLE range is insufficient.
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# KEEP ENABLED. Disabling this reintroduced the trackball SPI desync/dropouts:
# the radio's connection management shares CPU timing and the power rail with
# the 125Hz SPI polling, so connection-param changes destabilize the sensor.
# Disabling it did NOT fix the Windows 11 work-PC pairing anyway, so it stays on.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_EXT_POWER=y

# Disable 2Mbps BLE PHY. ZMK docs report certain Windows BT chipsets
# (Realtek/Intel, common in work laptops) have firmware bugs with 2M PHY that
# block pairing/connection; 1M PHY is more compatible. NOTE: radio-layer change
# (alters on-air time) — verify the trackball stays smooth after flashing, the
# same class of change that previously destabilized the sensor.
CONFIG_BT_CTLR_PHY_2M=n