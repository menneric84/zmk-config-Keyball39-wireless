CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_EXT_POWER=y

CONFIG_PMW3610=y
# CPI is a hardware register (steps of 200). DIVIDOR is software integer
# division with the remainder DISCARDED, so any dividor >1 drops slow/fine
# movement (sub-dividor counts per poll become 0). Keep DIVIDOR=1 and set the
# resolution via CPI so every count registers. Tune speed in 200 steps.
CONFIG_PMW3610_CPI=800
CONFIG_PMW3610_CPI_DIVIDOR=2
CONFIG_PMW3610_ORIENTATION_180=y
# Snipe (precision) layer: 200 is the hardware floor; DIVIDOR=1 keeps it smooth.
CONFIG_PMW3610_SNIPE_CPI=200
CONFIG_PMW3610_SNIPE_CPI_DIVIDOR=1
CONFIG_PMW3610_SCROLL_TICK=32
CONFIG_PMW3610_INVERT_SCROLL_X=y
# KEEP ON. Disabling this caused big erratic movements on this trackball — the
# smart algorithm is needed for good tracking on this ball surface.
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20
# Keep the sensor out of rest/downshift modes. Waking from rest re-syncs SPI,
# which is a common point for the PMW3610 to desync and die until a full power
# cycle. Higher idle current, but removes a sensor-dropout trigger.
CONFIG_PMW3610_FORCE_AWAKE=y
CONFIG_PMW3610_POLLING_RATE_125_SW=y

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=700
CONFIG_PMW3610_MOVEMENT_THRESHOLD=0
